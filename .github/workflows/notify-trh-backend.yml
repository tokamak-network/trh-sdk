name: Notify trh-backend of new SDK version

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger trh-backend dependency update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRH_BACKEND_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'tokamak-network',
              repo: 'trh-backend',
              event_type: 'trh-sdk-updated',
              client_payload: {
                commit: context.sha
              }
            })
